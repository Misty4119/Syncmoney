# ==========================================
# Syncmoney Main Configuration File
# ==========================================

# Config schema version (DO NOT EDIT)
config-version: 11

# ==========================================
# 1. Core and Basic Settings
# ==========================================
# Multi-server identification (Pub/Sub filtering and debugging)
server-name: ""

# Event queue (BlockingQueue capacity)
queue-capacity: 50000

# Feature switches
pubsub-enabled: true
db-enabled: true

# Debug mode (output detailed logs)
debug: false


# ==========================================
# 2. Database and Redis
# ==========================================
# Redis (Connection pool)
redis:
  enabled: true          # Whether to enable Redis
  host: "localhost"
  port: 6379
  password: ""
  database: 0
  pool-size: 30

# MySQL (PostgreSQL can be used as a future expansion)
database:
  enabled: true          # Whether to enable the database
  type: "mysql"
  host: "localhost"
  port: 3306
  username: "root"
  password: ""
  database: "syncmoney"
  pool-size: 10
  minimum-idle: 2
  connection-timeout: 10000
  max-lifetime: 600000
  idle-timeout: 300000


# ==========================================
# 3. Economy and Transaction Settings
# ==========================================
# ===== Economy mode configuration =====
economy:
  # Economy mode: auto (auto detection) / local / local_redis / sync / cmi
  mode: "auto"  
  sync:
    # Whether to enable Vault intercept
    vault-intercept: true
    vault-intercept-deposit: true
    vault-intercept-withdraw: true
    # Source whitelist
    vault-whitelist: []
    # Ignored commands
    ignore-commands: []
    # [THR-07 FIX] Known plugin classes for economy detection
    known-plugin-classes:
      - "QuickShop-Hikari"
      - "PlayerPoints"
      - "Jobs"
      - "DailyShop"
      - "CrateReloaded"
      - "zAuctionHouse"
      - "BankSystem"
      - "TokenManager"
  cmi:
    # Redis prefix
    redis-prefix: "syncmoney:cmi"
    # Detection interval (milliseconds)
    detect-interval-ms: 500
    # Cross-server sync
    cross-server-sync: true
    # Balance operation mode
    # api - Use CMI API (slower but more compatible)
    # internal - Direct database access (faster, default)
    balance-mode: "internal"
    # Debounce delay in ticks (1 tick = 0.05 seconds)
    # Reduces redundant sync operations during rapid balance changes
    debounce-ticks: 5
  local:
    # SQLite path
    sqlite-path: "plugins/Syncmoney/syncmoney.db"
    # Automatic save interval (seconds)
    auto-save-interval: 60

# Command and display settings
display:
  currency-name: "$"
  decimal-places: 2

# /pay transfer settings
pay:
  # Cooling time (seconds), 0 means no cooling
  cooldown-seconds: 30
  # Minimum single transfer amount
  min-amount: 1
  # Maximum single transfer amount
  max-amount: 1000000
  # Whether to allow transfers in degraded mode
  allow-in-degraded: false
  # Large transfer confirmation threshold (if the amount exceeds this value, the command needs to be confirmed)
  confirm-threshold: 100000

# ===== Cross-server ranking and PAPI =====
baltop:
  # Cache seconds
  cache-seconds: 30
  # Number of entries per page
  entries-per-page: 10
  # Balance format (full/smart/abbreviated)
  format: "smart"
  # Number format configuration
  # Format: [threshold, "display text"]
  # Example: [1000000000000, "T"] or [1000000000000, "兆"]
  # The system will automatically sort by threshold from largest to smallest, using the first one that matches
  number-format:
    - [1000000000000, "T"]
    - [100000000, "億"]
    - [10000, "萬"]
    - [1000, "K"]


# ==========================================
# 4. Security and Protection Mechanisms
# ==========================================
# ===== Economic circuit breaker mechanism =====
circuit-breaker:
  # Whether to enable the circuit breaker mechanism
  enabled: true
  # Single transaction limit (blocks transactions exceeding this amount)
  max-single-transaction: 100000000
  # Transaction frequency limit (maximum global transactions per second)
  max-transactions-per-second: 5
  # Rapid inflation threshold (total increase percentage within check interval, triggers global lockdown)
  rapid-inflation-threshold: 0.2
  # Rapid inflation check interval (minutes)
  inflation-check-interval-minutes: 5
  # Abnormal large change detection (balance change multiplier, if exceeded, transaction will be blocked)
  sudden-change-threshold: 100
  # Redis disconnect after how many seconds enter LOCKED mode (seconds)
  redis-disconnect-lock-seconds: 5
  # Memory usage warning threshold (percentage)
  memory-warning-threshold: 80
  # Connection pool exhausted warning threshold (remaining connections, default is 20% of the pool size)
  pool-exhausted-warning: 2

  # ===== Per-Player Protection (L1-L3) =====
  # L1: Rate Limiting - L2: Anomaly Detection - L3: Player Lock + Auto Unlock
  player-protection:
    # Whether to enable per-player protection
    enabled: true
    # L1: Rate Limiting
    rate-limit:
      # Maximum transactions per second per player
      max-transactions-per-second: 5
      # Maximum transactions per minute per player
      max-transactions-per-minute: 50
      # Maximum transaction amount per minute per player (0 = disabled)
      max-amount-per-minute: 1000000
    # L2: Anomaly Detection
    anomaly-detection:
      # Number of seconds in the window to trigger WARNING
      warning-window-seconds: 30
      # Transaction count threshold to trigger WARNING
      warning-threshold: 30
      # Balance change multiplier threshold (if exceeded, player will be locked)
      balance-change-threshold: 50.0
    # L3: Player Lock + Auto Unlock
    auto-unlock:
      # Lock duration in minutes before auto-unlock attempt
      lock-duration-minutes: 5
      # Maximum number of lock extensions (0 = infinite)
      max-lock-extensions: 3
      # Number of successful transactions required to confirm unlock
      unlock-test-transactions: 3
    # Transfer Protection: Lock receiver temporarily after large transfers
    transfer-protection:
      # Whether to lock receiver when receiving large transfers
      lock-receiver: true
      # Amount threshold for locking receiver (0 = disabled)
      receiver-lock-threshold: 100000
    global-lock:
      # Whether to enable global lock
      enabled: false
      # Total inflation threshold for global lock
      total-inflation-threshold: 0.2

# ===== Discord Webhook Notification System =====
discord-webhook:
  # Master switch for Discord webhook notifications
  enabled: false

  # ===== Available Events =====
  # Player Protection:
  #   - rate_limit: Player exceeded transaction rate limit
  #   - player_warning: Player entered warning state
  #   - player_locked: Player account locked due to suspicious activity
  #   - player_unlocked: Player account unlocked
  # System Security:
  #   - global_lock: Entire economy system locked
  #   - circuit_breaker_trigger: Circuit breaker triggered
  # Resource Monitoring:
  #   - memory_high: Server memory usage too high
  #   - redis_pool_critical: Redis connection pool exhausted
  # Transactions:
  #   - high_value_transaction: Transaction exceeds threshold
  # Database:
  #   - schema_upgrade: Database schema upgraded
  # Migration:
  #   - migration_complete: CMI migration completed
  #   - migration_failed: CMI migration failed

  # Webhook configurations (supports multiple webhooks)
  webhooks:
    # Private webhook (for admin eyes only)
    - name: "admin-alerts"
      url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_URL_HERE"
      type: "private"
      events:
        # Player protection events
        - "rate_limit"
        - "player_warning"
        - "player_locked"
        - "player_unlocked"
        # System security events
        - "global_lock"
        - "circuit_breaker_trigger"
        # Resource monitoring events
        - "memory_high"
        - "redis_pool_critical"
        # Transaction events
        - "high_value_transaction"
        # Database events
        - "schema_upgrade"
        # Migration events
        - "migration_complete"
        - "migration_failed"
    # Public webhook (for server members)
    # - name: "public-alerts"
    #   url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_URL_HERE"
    #   type: "public"
    #   events:
    #     - "global_lock"
  # Embed customization
  embed:
    # Embed color (hex, e.g., FF5555 = red, 4ADE80 = green, FBBF24 = yellow)
    color: "FF5555"
    # Show player name in embed
    show-player-name: true
    # Show timestamp in embed
    show-timestamp: true
    # Bot username displayed in Discord
    username: "Syncmoney Alert"

# Cross-server portal protection
transfer-guard:
  # Whether to enable portal protection
  enabled: true
  # Maximum wait time (milliseconds)
  max-wait-ms: 500

# ===== Audit log system =====
audit:
  # Whether to enable audit log
  enabled: true
  # Batch write size (100 is recommended for better performance)
  batch-size: 100
  # Flush interval in milliseconds (5000 = 5 seconds, 0 = disabled)
  flush-interval-ms: 5000
  # Retention days (0 = permanent)
  retention-days: 90
  # Automatic cleanup settings
  cleanup:
    # Whether to enable automatic cleanup
    enabled: true
    # Cleanup interval (hours)
    interval-hours: 24
  # Automatic export settings
  export:
    # Whether to enable automatic export
    enabled: true
    # Export folder
    export-folder: "./plugins/Syncmoney/logs/"
    # Whether to delete database records after export
    delete-after-export: true
  # Redis hybrid audit settings (Redis sliding window + DB persistence)
  redis:
    # Enable Redis sliding window for real-time audit
    enabled: true
    # Sliding window size (100-200 recommended)
    window-size: 200
    # Migration threshold (trigger migration when pending >= threshold)
    migration-threshold: 5
    # Migration batch size
    migration-batch-size: 20
    # Migration interval (milliseconds)
    migration-interval-ms: 1000
    # Time-based flush threshold (trigger migration after this time even if below threshold)
    # 0 = disabled, 2000 = 2 seconds
    flush-interval-ms: 2000
  # Deduplication settings
  deduplication:
    # Enable deduplication (recommended for production)
    enabled: true
    # Server-side deduplication window in seconds (3600 = 1 hour)
    server-window-seconds: 3600


# ==========================================
# 5. Permissions and Administration
# ==========================================
# Permission nodes (optional custom)
permissions:
  money: syncmoney.money
  money-others: syncmoney.money.others
  pay: syncmoney.pay
  admin: syncmoney.admin
  admin-set: syncmoney.admin.set
  admin-give: syncmoney.admin.give
  admin-take: syncmoney.admin.take

# ===== Admin permissions levels =====
admin-permissions:
  # Whether to enable daily limit
  enforce-daily-limit: true
  # Large operation confirmation threshold (if the amount exceeds this value, the command needs to be confirmed)
  confirm-threshold: 500000
  # Permission level settings
  levels:
    observe:
      permission: "syncmoney.admin.observe"
      daily-give-limit: 0
      daily-take-limit: 0
    reward:
      permission: "syncmoney.admin.reward"
      daily-give-limit: 100000
      daily-take-limit: 0
    general:
      permission: "syncmoney.admin.general"
      daily-give-limit: 1000000
      daily-take-limit: 1000000
    full:
      permission: "syncmoney.admin.full"
      daily-give-limit: 0
      daily-take-limit: 0

# Admin notification list (used for large transaction notifications)
notify-admins: []


# ==========================================
# 6. Messages and Notifications
# ==========================================
# ===== Messages settings =====
messages:
  # Whether to enable Legacy color support
  legacy-color-support: true
  # Legacy color prefix character
  legacy-character: "&"
  # Whether to enable MiniMessage
  minimessage-support: true
  # Whether to enable HEX colors
  hex-colors: true

# Cross-server notifications
cross-server-notifications:
  enabled: true
  notify-type: "all" # all: all types, deposit-only: only deposit, withdraw-only: only withdraw, none: none
  show-actionbar: true
  actionbar-duration: 80


# ==========================================
# 7. Migration and Syncing
# ==========================================
# Migration settings
migration:
  cmi:
    # Automatic detection: read configuration from DataBaseInfo.yml
    auto-detect: true
    # Manual configuration (when auto-detect: false)
    # If MySQL, the table name will be automatically prefixed (e.g. CMI_users)
    host: "localhost"
    port: 3306
    username: "root"
    password: ""
    database: "minecraft"
    # Table prefix (MySQL mode)
    table-prefix: "CMI_"
    # SQLite database path (SQLite mode, single path)
    sqlite-path: "plugins/CMI/cmi.sqlite.db"
    # Multi-server mode: scan multiple databases and merge (only CMI SQLite mode)
    multi-server:
      enabled: true
      # Multiple SQLite path configuration (supports Windows and Linux full paths)
      # Windows: "G:/Servers/Main/plugins/CMI/cmi.sqlite.db"
      # Linux: "/home/minecraft/server1/plugins/CMI/cmi.sqlite.db"
      sqlite-paths:
        - "plugins/CMI/cmi.sqlite.db"
      # Merge strategy: latest (based on the last login), sum (total), max (maximum)
      merge-strategy: "latest"
    # After migration, automatically disable CMI economy commands (balance, pay, baltop, money)
    auto-disable-commands: true
    # After migration, automatically disable CMI economy module
    auto-disable-economy: true
  # Batch size
  batch-size: 100
  # Automatic backup before migration
  auto-backup: true
  # Number of backups to keep (auto-cleanup old backups)
  backup:
    keep-count: 10
  # Populate Redis during migration (strongly recommended for SYNC mode)
  populate-redis: true
  # Lock economy operations during migration (prevents data inconsistency)
  lock-economy: false

# Shadow sync settings (backup Syncmoney balance to secondary database)
# Use case: When main database corrupts, can restore from backup
shadow-sync:
  # [Basic Settings]
  # Enable/disable shadow sync
  enabled: true
  # Sync target: local (write to Syncmoney DB), cmi (write to CMI DB), all (write to both)
  target: "local"

  # [Trigger Strategy] - Sync triggers when ANY condition is met
  trigger:
    # Batch threshold: Number of accumulated changes before triggering sync
    batch-size: 10
    # Time threshold: Milliseconds since last sync before triggering
    max-delay-ms: 1000

  # [Storage Settings]
  storage:
    # Storage type: jsonl (file), sqlite, mysql, postgresql
    type: "sqlite"
    # JSONL settings (used when type is jsonl)
    jsonl:
      path: "plugins/Syncmoney/logs/shadow-sync/"
    # SQLite settings (used when type is sqlite)
    sqlite:
      path: "plugins/Syncmoney/data/shadow-sync.db"
    # MySQL settings (used when type is mysql)
    mysql:
      host: "localhost"
      port: 3306
      username: "root"
      password: ""
      database: "syncmoney_shadow"
      # Connection pool size
      pool-size: 5
    # PostgreSQL settings (used when type is postgresql)
    postgresql:
      host: "localhost"
      port: 5432
      username: "root"
      password: ""
      database: "syncmoney_shadow"
      pool-size: 5

  # [CMI Database Connection] - For writing to CMI database
  cmi:
    # Connection mode: sqlite / mysql
    connection: "sqlite"
    # SQLite mode path
    sqlite-path: "plugins/CMI/cmi.sqlite.db"
    # MySQL mode (when SQLite fails or connection is sqlite)
    mysql:
      host: "localhost"
      port: 3306
      username: "root"
      password: ""
      database: "minecraft"

  # [Feature Settings]
  features:
    # Record balance change history (for player query)
    history-enabled: true
    # History retention days (0 = permanent)
    history-retention-days: 90

# ==========================================
# 8. Web Admin Dashboard
# ==========================================
web-admin:
  # Whether to enable Web Admin Dashboard
  enabled: false

  # Central management mode - act as a central panel that proxies to multiple game servers
  central-mode: false

  # Bundled web version in JAR (update this when releasing new version)
  bundled-version: "1.1.2"

  # HTTP server configuration
  server:
    host: "localhost"
    port: 8080

  # Central mode: list of game server nodes to manage
  nodes: []
    # - name: "Survival Server 1"
    #   url: "http://192.168.1.105:8080"
    #   api-key: "your-api-key-here"
    #   enabled: true
    # - name: "Factions Server 1"
    #   url: "http://192.168.1.105:8081"
    #   api-key: "your-api-key-here"
    #   enabled: true
    # - name: "Create Server 1"
    #   url: "http://192.168.1.106:8080"
    #   api-key: "your-api-key-here"
    #   enabled: true

  # Web frontend configuration
  web:
    path: "syncmoney-web"
    # Auto-download latest version on startup (conservative mode: false)
    auto-update: false
    # Auto-build frontend after download (requires Node.js + pnpm/npm on server)
    auto-build: false
    github-repo: "Misty4119/Syncmoney-web"

  # Security configuration
  security:
    api-key: "change-me-in-production"
    rate-limit:
      enabled: true
      requests-per-minute: 120
    # CORS allowed origins (comma-separated). Set specific domains in production for security.
    # Use [] for no origins (blocks all cross-origin requests), or ["https://domain1.com", "https://domain2.com"] for specific domains.
    # Using "*" is NOT recommended for production - only use for development/testing.
    cors-allowed-origins: []  # [SEC-03 FIX] Default to empty array for security

  # UI configuration
  ui:
    theme: "dark"
    language: "zh-TW"
    # Timezone offset from UTC: UTC, UTC+1, UTC+2, ..., UTC+12, UTC-1, ..., UTC-12
    timezone: "UTC"