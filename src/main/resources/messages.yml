  usage-set: ' <#F8FAFC>/syncmoney set <player> <amount> <#475569>⦊ <white>Set specific balance'
  usage-give: ' <#F8FAFC>/syncmoney give <player> <amount> <#475569>⦊ <white>Issue specific amount'
  usage-take: ' <#F8FAFC>/syncmoney take <player> <amount> <#475569>⦊ <white>Deduct specific amount'
