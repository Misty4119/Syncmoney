    give: '{prefix}<#94A3B8>Usage: <#38BDF8>/syncmoney give <player> <amount>'
    take: '{prefix}<#94A3B8>Usage: <#38BDF8>/syncmoney take <player> <amount>'
  balance-set-by-admin: '{prefix}<#FBBF24>Account Alteration ⦊ <#94A3B8>An administrator has adjusted your balance to <#F8FAFC>{balance}'
  money-received: '{prefix}<#4ADE80>System Disbursement ⦊ <#94A3B8>Your account received <#4ADE80>+{amount} <#475569>┇ <#94A3B8>New balance: <#A78BFA>{balance}'
