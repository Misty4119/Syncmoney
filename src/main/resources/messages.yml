# Syncmoney Modernized Message Configuration File (Futuristic Sci-Fi Version)
# Supports Minimessage format (<#F43F5E>, <#4ADE80>, <#FFFFFF> etc.)
# Style: HUD (Holographic Terminal) / Purple gradient / Blue gradient

# Config schema version (DO NOT EDIT) 
version: "11"

# System prefix (Purple gradient / Blue gradient)
prefix: '<bold><gradient:#A78BFA:#38BDF8>SyncMoney</gradient></bold> <#475569>⦊ <reset>'

# /money command (personal balance related)
money:
  self: '{prefix}<#94A3B8>Personal Asset Ledger: <#F8FAFC>{balance}'
  hint-check-others: '<#475569>┗━ <#94A3B8>Type <#38BDF8>/money <player> <#94A3B8>to check others'' balance'
  others: '{prefix}<#94A3B8>Player <#38BDF8>{player}<#94A3B8>''s balance: <#F8FAFC>{balance}'
  no-permission: '{prefix}<#F43F5E>AUTHORIZATION DENIED ⦊ <#94A3B8>You cannot view other players'' wallets.'
  no-permission-others: '{prefix}<#F43F5E>AUTHORIZATION DENIED ⦊ <#94A3B8>Cannot access others'' financial data.'
  hint-permission: '<#475569>┗━ <#94A3B8>Requires permission <#38BDF8>syncmoney.money.others <#94A3B8>to view others'' balance'
  player-not-found: '{prefix}<#F43F5E>QUERY FAILED ⦊ <#94A3B8>Target <white>{player} <#94A3B8>unreachable on the network grid.'
  player-only: '<#F43F5E>SYSTEM PROMPT ⦊ <#94A3B8>Command execution restricted to physical in-game terminals.'
  console-usage: '{prefix}<#94A3B8>Syntax Protocol: <#38BDF8>/money <player>'
  balance-visual: |
    {prefix}<#475569>╔═══════════════════════════════╗<reset>
    {prefix}<#475569>║<reset> <#94A3B8>Current Balance <reset>
    {prefix}<#475569>║<reset> <#A78BFA><bold>{balance}</bold><reset> <#38BDF8>{currency}<reset>
    {prefix}<#475569>╚═══════════════════════════════╝<reset>

# /pay command (transfer related)
pay:
  success-sender: '{prefix}<#94A3B8>Transaction Authorized. <#F8FAFC>{amount} <#94A3B8>routed to <#38BDF8>{player} <#475569>┇ <#94A3B8>Remaining Capital: <#A78BFA>{balance}'
  success-receiver: '{prefix}<#4ADE80>Incoming Transmission ⦊ <#94A3B8>Acquired <#4ADE80>+{amount} <#94A3B8>from <#38BDF8>{player}.'
  insufficient-funds: '{prefix}<#F43F5E>TRANSACTION REJECTED ⦊ <#94A3B8>Insufficient capital reserves. (Available: {balance})'
  self-transfer: '{prefix}<#F43F5E>TRANSACTION REJECTED ⦊ <#94A3B8>Circular routing to origin address is prohibited.'
  invalid-amount: '{prefix}<#F43F5E>SYNTAX EXCEPTION ⦊ <#94A3B8>Value must be strictly positive.'
  amount-too-low: '{prefix}<#F43F5E>TRANSACTION REJECTED ⦊ <#94A3B8>Value falls below the minimum threshold of <white>{min}.'
  amount-too-high: '{prefix}<#F43F5E>TRANSACTION REJECTED ⦊ <#94A3B8>Value exceeds the maximum threshold of <white>{max}.'
  cooldown: '{prefix}<#FBBF24>RATE LIMIT EXCEEDED ⦊ <#94A3B8>Cooling down. Please hold <white>{seconds} <#94A3B8>seconds.'
  player-not-found: '{prefix}<#F43F5E>TRANSACTION REJECTED ⦊ <#94A3B8>Target <white>{player} <#94A3B8>unreachable or invalid.'
  target-not-found: '{prefix}<#F43F5E>NETWORK ANOMALY ⦊ <#94A3B8>Failed to resolve destination coordinates for <white>{player}.'
  target-uuid-not-found: '{prefix}<#F43F5E>TRANSACTION REJECTED ⦊ <#94A3B8>Identifier resolution failed for <white>{player}.'
  lock-failed: '{prefix}<#FBBF24>PROCESSING QUEUE FULL ⦊ <#94A3B8>Transaction pending, please retry shortly.'
  transfer-failed: '{prefix}<#F43F5E>TRANSMISSION INTERRUPTED ⦊ <white>{error}'
  error: '{prefix}<#F43F5E>SYSTEM EXCEPTION ⦊ <#94A3B8>Transaction could not be completed, please contact a network administrator for assistance.'
  degraded-mode-transfer: '{prefix}<b><#FBBF24>[ NETWORK DESYNC ]</b> <#94A3B8>Sync system is delayed, this transfer may only apply to the current server node.'
  player-only: '<#F43F5E>SYSTEM PROMPT ⦊ <#94A3B8>Command execution restricted to physical in-game terminals.'
  usage: '{prefix}<#94A3B8>Valid Protocol: <#38BDF8>/pay <player> <amount>'
  degraded-mode-message: '{prefix}<#F43F5E>Security grid engaged. Financial routing temporarily suspended.'
  invalid-amount-format: '{prefix}<#F43F5E>SYNTAX EXCEPTION ⦊ <#94A3B8>Unrecognized numerical format detected.'
  amount-must-be-positive: '{prefix}<#F43F5E>SYNTAX EXCEPTION ⦊ <#94A3B8>Transaction values must remain strictly positive.'
  confirm-request: '{prefix}<#FBBF24>VERIFICATION REQUIRED ⦊ <#94A3B8>High-volume transaction detected. Manual override needed.'
  confirm-details: '<#475569>┣━ <#94A3B8>Target: <#38BDF8>{player} <#94A3B8>Amount: <#F8FAFC>{amount}'
  confirm-hint: '<#475569>┗━ <#4ADE80>Awaiting <#38BDF8>/pay confirm <#4ADE80>within 30 seconds.'
  confirm-expired: '{prefix}<#F43F5E>VERIFICATION TIMEOUT ⦊ <#94A3B8>Session expired. Please re-initiate the transaction.'
  hint-format: '<#475569>┗━ <#94A3B8>Syntax Protocol: <#38BDF8>/pay <player> <amount>'
  duplicate-transfer: '{prefix}<#F43F5E>TRANSACTION REJECTED ⦊ <#94A3B8>Duplicate packet detected. Please hold.'
  database-error: '{prefix}<#F43F5E>TRANSACTION REJECTED ⦊ <#94A3B8>Database synchronization failure during execution.'
  account-locked: '{prefix}<#F43F5E>ACCOUNT FROZEN ⦊ <#94A3B8>Assets locked by automated security grid. Contact administrator.'

# General messages
general:
  degraded-warning: '{prefix}<b><#FBBF24>[ NETWORK DESYNC ]</b> <#94A3B8>Central database unreachable. Displaying cached local data only.'
  degraded-local: '{prefix}<b><#FBBF24>[ OFFLINE STATUS ]</b> <#94A3B8>Cross-server protocols suspended. Reading local node data.'
  error: '{prefix}<#F43F5E>Critical failure encountered. Please file a diagnostic report.'
  no-permission: '{prefix}<#F43F5E>Insufficient clearance for this operation.'
  sync-error: '{prefix}<#F43F5E>Data desynchronization detected. Re-authenticate to secure assets.'
  player-only: '<#F43F5E>SYSTEM PROMPT ⦊ <#94A3B8>Command execution restricted to physical in-game terminals.'
  time-format:
    seconds-ago: '{seconds} seconds ago'
    minutes-ago: '{minutes} minutes ago'
    hours-ago: '{hours} hours ago'
    never: 'No record'

# Command router (SyncmoneyCommandRouter)
router:
  unknown-command: '{prefix}<#F43F5E>INVALID SYNTAX ⦊ <white>{subcommand}'
  help:
    header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>SYNC.MONEY PROTOCOL DIRECTORY</bold></gradient> <#475569>▰▰▰▰'
    admin: ' <#38BDF8>▪ <click:suggest_command:/syncmoney admin><#F8FAFC>/syncmoney admin</click> <#475569>⦊ <#94A3B8>Economy Management (Give/Set/Take)'
    breaker: ' <#38BDF8>▪ <click:suggest_command:/syncmoney breaker><#F8FAFC>/syncmoney breaker</click> <#475569>⦊ <#94A3B8>Breaker Protection Status'
    audit: ' <#38BDF8>▪ <click:suggest_command:/syncmoney audit><#F8FAFC>/syncmoney audit</click> <#475569>⦊ <#94A3B8>Financial Audit Log'
    econstats: ' <#38BDF8>▪ <click:suggest_command:/syncmoney econstats><#F8FAFC>/syncmoney econstats</click> <#475569>⦊ <#94A3B8>Global Economy Stats'
    monitor: ' <#38BDF8>▪ <click:suggest_command:/syncmoney monitor><#F8FAFC>/syncmoney monitor</click> <#475569>⦊ <#94A3B8>Server Resource Monitor'
    shadow: ' <#38BDF8>▪ <click:suggest_command:/syncmoney shadow><#F8FAFC>/syncmoney shadow</click> <#475569>⦊ <#94A3B8>Background Data Sync Status'
    reload: ' <#38BDF8>▪ <click:suggest_command:/syncmoney reload><#F8FAFC>/syncmoney reload</click> <#475569>⦊ <#94A3B8>Reload Configuration'
    migrate: ' <#38BDF8>▪ <click:suggest_command:/syncmoney migrate><#F8FAFC>/syncmoney migrate</click> <#475569>⦊ <#94A3B8>Legacy Data Migration Tool'
    web: ' <#38BDF8>▪ <click:suggest_command:/syncmoney web><#F8FAFC>/syncmoney web</click> <#475569>⦊ <#94A3B8>Web Frontend Management'
    test: ' <#38BDF8>▪ <click:suggest_command:/syncmoney test><#F8FAFC>/syncmoney test</click> <#475569>⦊ <#94A3B8>System Stress Test'

# Config upgrade notification (shown when config is upgraded)
config-upgraded:
  - '{prefix}<#4ADE80>ARCHITECTURE UPGRADED ⦊ <#94A3B8>Added <#38BDF8>{count} <#94A3B8>new parameters.'
  - '<#475569>┗━ <#94A3B8>Execute <#38BDF8>/syncmoney reload <#94A3B8>to apply changes.'

# Migration system (Migration)
migration:
  started: '{prefix}<#94A3B8>Initiating CMI economy data migration sequence...'
  progress: '{prefix}<#94A3B8>Migration Progress: <#38BDF8>{current}<#475569>/<#38BDF8>{total} <white>({percent}%)'
  completed: '{prefix}<#4ADE80>Migration Complete! <#94A3B8>Processed <white>{count} <#94A3B8>records, total circulating amount: <#F8FAFC>{total}'
  error: '{prefix}<#F43F5E>Migration encountered an error and was aborted: <white>{error}'
  already-running: '{prefix}<#FBBF24>VERIFICATION REQUIRED ⦊ <#94A3B8>A migration task is already in progress.'
  not-running: '{prefix}<#94A3B8>No active migration task currently running.'
  stopped: '{prefix}<#94A3B8>Migration task manually aborted by administrator.'
  resuming: '{prefix}<#94A3B8>Resuming migration from the last checkpoint...'
  no-checkpoint: '{prefix}<#94A3B8>No historical checkpoint found, starting fresh.'
  cleared: '{prefix}<#94A3B8>All migration checkpoint records have been cleared.'
  cmi-connection-failed: '{prefix}<#F43F5E>Database connection failed (CMI): <white>{error}'
