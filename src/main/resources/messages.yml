    checking: '{prefix}<#94A3B8>Conducting comprehensive audit of total currency supply...'
    result:
      header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Global Asset Snapshot</bold></gradient> <#475569>▰▰▰▰'
      total: ' <#38BDF8>▪ <#94A3B8>Total Market Circulation: <#F8FAFC>{amount}'
      cached-players: ' <#38BDF8>▪ <#94A3B8>Cached Players Audited: <white>{count}'
  usage:
    header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Developer Testing Tools</bold></gradient> <#475569>▰▰▰▰'
    concurrent-pay: '<#94A3B8>/syncmoney test concurrent-pay <threads> <iterations> - Concurrent transfer stress test'
