# Syncmoney Modernized Message Configuration File (Futuristic Sci-Fi Version)
# Supports Minimessage format (<red>, <green>, <#FFFFFF> etc.)
# Style: HUD (Holographic Terminal) / Purple gradient / Blue gradient

# System prefix (Purple gradient / Blue gradient)
prefix: '<bold><gradient:#A78BFA:#38BDF8>SyncMoney</gradient></bold> <#475569>⦊ <reset>'

# /money command (personal balance related)
money:
  self: '{prefix}<#94A3B8>Your wallet balance: <#F8FAFC>{balance}'
  hint-check-others: '<#475569>┗━ <#94A3B8>Type <#38BDF8>/money <player> <#94A3B8>to check others'' balance'
  others: '{prefix}<#94A3B8>Player <#38BDF8>{player}<#94A3B8>''s balance: <#F8FAFC>{balance}'
  no-permission: '{prefix}<#F43F5E>Access Denied ⦊ <#94A3B8>You cannot view other players'' wallets.'
  no-permission-others: '{prefix}<#F43F5E>Access Denied ⦊ <#94A3B8>Cannot access others'' financial data.'
  hint-permission: '<#475569>┗━ <#94A3B8>Requires permission <#38BDF8>syncmoney.money.others <#94A3B8>to view others'' balance'
  player-not-found: '{prefix}<#F43F5E>Query Failed ⦊ <#94A3B8>Player <white>{player} <#94A3B8>not found on the server.'
  player-only: '<#F43F5E>System Prompt ⦊ <#94A3B8>This command is restricted to in-game players.'
  console-usage: '{prefix}<#94A3B8>Usage: <#38BDF8>/money <player>'
  balance-visual: |
    {prefix}<#475569>╔═══════════════════════════════╗<reset>
    {prefix}<#475569>║<reset> <#94A3B8>Current Balance <reset>
    {prefix}<#475569>║<reset> <#A78BFA><bold>{balance}</bold><reset> <#38BDF8>{currency}<reset>
    {prefix}<#475569>╚═══════════════════════════════╝<reset>

# /pay command (transfer related)
pay:
  success-sender: '{prefix}<#94A3B8>Successfully transferred <#F8FAFC>{amount} <#94A3B8>to <#38BDF8>{player} <#475569>┇ <#94A3B8>Remaining balance: <#A78BFA>{balance}'
  success-receiver: '{prefix}<#4ADE80>Funds received! <#94A3B8>Transfer from <#38BDF8>{player} <#4ADE80>+{amount}'
  insufficient-funds: '{prefix}<#F43F5E>Transfer Failed ⦊ <#94A3B8>Insufficient wallet balance.'
  self-transfer: '{prefix}<#F43F5E>Transfer Failed ⦊ <#94A3B8>Cannot transfer funds to yourself.'
  invalid-amount: '{prefix}<#F43F5E>Format Error ⦊ <#94A3B8>Please enter a valid number greater than 0.'
  amount-too-low: '{prefix}<#F43F5E>Transfer Failed ⦊ <#94A3B8>Single transfer amount cannot be lower than <white>{min}'
  amount-too-high: '{prefix}<#F43F5E>Transfer Failed ⦊ <#94A3B8>Single transfer amount cannot be higher than <white>{max}'
  cooldown: '{prefix}<#FBBF24>Operation Too Frequent ⦊ <#94A3B8>Please wait <white>{seconds} <#94A3B8>seconds before trying again.'
  player-not-found: '{prefix}<#F43F5E>Transfer Failed ⦊ <#94A3B8>Target player <white>{player} <#94A3B8>not found, please check the name.'
  target-not-found: '{prefix}<#F43F5E>Connection Anomaly ⦊ <#94A3B8>Unable to locate data for target player <white>{player}.'
  lock-failed: '{prefix}<#FBBF24>System Busy ⦊ <#94A3B8>Transaction is processing, please try again later.'
  transfer-failed: '{prefix}<#F43F5E>Transfer Interrupted ⦊ <white>{error}'
  error: '{prefix}<#F43F5E>System Error ⦊ <#94A3B8>Transaction could not be completed, please contact an administrator for assistance.'
  degraded-mode: '{prefix}<b><#F43F5E>[ System Protected ]</b> <#94A3B8>Economy sync service is under maintenance, all transfers are suspended.'
  degraded-mode-transfer: '{prefix}<b><#FBBF24>[ Cross-Server Warning ]</b> <#94A3B8>Sync system is delayed, this transfer may only apply to the current server.'
  player-only: '<#F43F5E>System Prompt ⦊ <#94A3B8>This command is restricted to in-game players.'
  usage: '{prefix}<#94A3B8>Correct usage: <#38BDF8>/pay <player> <amount>'
  degraded-mode-message: '{prefix}<#F43F5E>System protection mechanism activated, transfer functions suspended.'
  invalid-amount-format: '{prefix}<#F43F5E>Format Error ⦊ <#94A3B8>Please enter a valid numerical amount.'
  amount-must-be-positive: '{prefix}<#F43F5E>Format Error ⦊ <#94A3B8>Transfer amount must be greater than 0.'
  confirm-request: '{prefix}<#FBBF24>System Prompt ⦊ <#94A3B8>Large transfer detected, please enter the command to confirm.'
  confirm-details: '<#475569>┣━ <#94A3B8>Target: <#38BDF8>{player} <#94A3B8>Amount: <#F8FAFC>{amount}'
  confirm-hint: '<#475569>┗━ <#4ADE80>Please enter <#38BDF8>/pay confirm <#4ADE80>within 30 seconds to proceed.'
  confirm-expired: '{prefix}<#F43F5E>Confirmation Expired ⦊ <#94A3B8>Transfer request timed out, please re-enter the transfer command.'
  hint-format: '<#475569>┗━ <#94A3B8>Correct format: <#38BDF8>/pay <player> <amount>'

# General messages
general:
  degraded-warning: '{prefix}<b><#FBBF24>[ Connection Warning ]</b> <#94A3B8>Unable to connect to the central database, currently displaying local cached balance only.'
  degraded-local: '{prefix}<b><#FBBF24>[ Offline Mode ]</b> <#94A3B8>Cross-server sync suspended, currently displaying local server data.'
  error: '{prefix}<#F43F5E>An unexpected error occurred, please report it to the server administrator.'
  no-permission: '{prefix}<#F43F5E>You do not have permission to execute this command.'
  sync-error: '{prefix}<#F43F5E>Data synchronization failed. For data safety, please log back into the server.'
  player-only: '<#F43F5E>System Prompt ⦊ <#94A3B8>This command is restricted to in-game players.'
  time-format:
    seconds-ago: '{seconds} seconds ago'
    minutes-ago: '{minutes} minutes ago'
    hours-ago: '{hours} hours ago'
    never: 'No record'

# Command router (SyncmoneyCommandRouter)
router:
  unknown-command: '{prefix}<#F43F5E>Unknown command parameter: <white>{subcommand}'
  help:
    header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>SYNC.MONEY SYSTEM COMMANDS</bold></gradient> <#475569>▰▰▰▰'
    admin: ' <#38BDF8>▪ <click:suggest_command:/syncmoney admin><#F8FAFC>/syncmoney admin</click> <#475569>⦊ <#94A3B8>Economy Management (Give/Set/Take)'
    breaker: ' <#38BDF8>▪ <click:suggest_command:/syncmoney breaker><#F8FAFC>/syncmoney breaker</click> <#475569>⦊ <#94A3B8>Breaker Protection Status'
    audit: ' <#38BDF8>▪ <click:suggest_command:/syncmoney audit><#F8FAFC>/syncmoney audit</click> <#475569>⦊ <#94A3B8>Financial Audit Log'
    econstats: ' <#38BDF8>▪ <click:suggest_command:/syncmoney econstats><#F8FAFC>/syncmoney econstats</click> <#475569>⦊ <#94A3B8>Global Economy Stats'
    monitor: ' <#38BDF8>▪ <click:suggest_command:/syncmoney monitor><#F8FAFC>/syncmoney monitor</click> <#475569>⦊ <#94A3B8>Server Resource Monitor'
    shadow: ' <#38BDF8>▪ <click:suggest_command:/syncmoney shadow><#F8FAFC>/syncmoney shadow</click> <#475569>⦊ <#94A3B8>Background Data Sync Status'
    reload: ' <#38BDF8>▪ <click:suggest_command:/syncmoney reload><#F8FAFC>/syncmoney reload</click> <#475569>⦊ <#94A3B8>Reload Configuration'
    migrate: ' <#38BDF8>▪ <click:suggest_command:/syncmoney migrate><#F8FAFC>/syncmoney migrate</click> <#475569>⦊ <#94A3B8>Legacy Data Migration Tool'
    test: ' <#38BDF8>▪ <click:suggest_command:/syncmoney test><#F8FAFC>/syncmoney test</click> <#475569>⦊ <#94A3B8>System Stress Test'

# Migration system (Migration)
migration:
  started: '{prefix}<#94A3B8>Initiating CMI economy data migration sequence...'
  progress: '{prefix}<#94A3B8>Migration Progress: <#38BDF8>{current}<#475569>/<#38BDF8>{total} <white>({percent}%)'
  completed: '{prefix}<#4ADE80>Migration Complete! <#94A3B8>Processed <white>{count} <#94A3B8>records, total circulating amount: <#F8FAFC>{total}'
  error: '{prefix}<#F43F5E>Migration encountered an error and was aborted: <white>{error}'
  already-running: '{prefix}<#FBBF24>System Prompt ⦊ <#94A3B8>A migration task is already in progress.'
  not-running: '{prefix}<#94A3B8>No active migration task currently running.'
  stopped: '{prefix}<#94A3B8>Migration task manually aborted by administrator.'
  resuming: '{prefix}<#94A3B8>Resuming migration from the last checkpoint...'
  no-checkpoint: '{prefix}<#94A3B8>No historical checkpoint found, starting fresh.'
  cleared: '{prefix}<#94A3B8>All migration checkpoint records have been cleared.'
  cmi-connection-failed: '{prefix}<#F43F5E>Database connection failed (CMI): <white>{error}'
  status-header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Migration Status</bold></gradient> <#475569>▰▰▰▰'
  status-state: ' <#38BDF8>▪ <#94A3B8>Current State: <white>{state}'
  status-total-players: ' <#38BDF8>▪ <#94A3B8>Total Players: <white>{count}'
  status-migrated: ' <#38BDF8>▪ <#94A3B8>Migrated: <#4ADE80>{count}'
  status-failed: ' <#38BDF8>▪ <#94A3B8>Failed: <#F43F5E>{count}'
  status-progress: ' <#38BDF8>▪ <#94A3B8>Progress: <#38BDF8>{percent}%'
  status-start-time: ' <#38BDF8>▪ <#94A3B8>Start Time: <white>{time}'
  status-remaining: ' <#38BDF8>▪ <#94A3B8>Estimated Remaining: <white>{seconds} seconds'
  status-failures: '<#F43F5E>▪ Total Failure Count: {count} records'
  usage-header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Migration Guide</bold></gradient> <#475569>▰▰▰▰'
  usage-cmi: ' <#F8FAFC>/syncmoney migrate cmi <#94A3B8>[-force] [-no-backup] <#475569>⦊ <white>Execute CMI migration'
  usage-status: ' <#F8FAFC>/syncmoney migrate status <#475569>⦊ <white>View current progress'
  usage-resume: ' <#F8FAFC>/syncmoney migrate resume <#475569>⦊ <white>Resume from last checkpoint'
  usage-stop: ' <#F8FAFC>/syncmoney migrate stop <#475569>⦊ <white>Force abort task'
  usage-clear: ' <#F8FAFC>/syncmoney migrate clear <#475569>⦊ <white>Clear progress cache'
  cmi-disabled-commands: '{prefix}<#4ADE80>System has automatically intercepted CMI economy commands (balance, pay, etc.).'
  cmi-disabled-economy: '{prefix}<#4ADE80>System has automatically disabled the CMI economy module.'
  cmi-disable-failed: '{prefix}<#F43F5E>Failed to disable CMI economy module: <white>{error}'
  cmi-reload: '{prefix}<#4ADE80>CMI configuration files reloaded.'
  preview-header: '<#A78BFA>┣━ [ Migration Preview Mode ]'
  preview-multi-server-header: '<#A78BFA>┣━ [ Cross-Server Migration Preview Mode ]'
  preview-player-count: '<#4ADE80>Expected to migrate <white>{count} <#4ADE80>player records:'
  preview-player-line: ' <#475569>├─ <#38BDF8>{player} <#475569>┇ <#F8FAFC>{balance}'
  preview-more-players: ' <#475569>└─ <#94A3B8>... and {count} other players'
  preview-total: '<#94A3B8>Expected total migration amount: <#F8FAFC>{total}'
  preview-execute-hint: '<#FBBF24>Upon confirmation, enter <#38BDF8>/syncmoney migrate cmi -force <#FBBF24>to execute.'
  single-db-player-count: '<#4ADE80>Loaded <white>{count} <#4ADE80>player records from the database'
  single-db-preview-total: '<#94A3B8>Total amount in database: <#F8FAFC>{total}'
  multi-server-start: '{prefix}<#94A3B8>Reading CMI data using multi-server mode...'
  multi-server-db-count: '<#4ADE80>Successfully loaded {count} database configurations:'
  multi-server-db-path: ' <#475569>▪ <#94A3B8>{path}'
  multi-server-strategy: '<#94A3B8>Data Merging Strategy: <white>{strategy}'
  local-to-sync-started: '{prefix}<#94A3B8>Initiating local-to-sync migration...'
  local-to-sync-completed: '{prefix}<#4ADE80>Local-to-Sync migration complete! <#94A3B8>Processed <white>{count} <#94A3B8>records, failed: <#F43F5E>{failed}'
  usage-local-to-sync: ' <#F8FAFC>/syncmoney migrate local-to-sync <#94A3B8>[-force] [-no-backup] <#475569>⦊ <white>Migrate local data to database'

# Breaker (Protection mechanism)
breaker:
  enabled:
    active: '<green>Active</green>'
    inactive: '<red>Inactive</red>'
  health:
    healthy: '<green>Healthy'
    abnormal: '<red>Abnormal'
  notification:
    abnormal-change: '<b><#F43F5E>[ Security Alert ]</b> <#94A3B8>Abnormal fund variation detected, administrators please review logs immediately!'
    supply-spike: '<b><#F43F5E>[ Security Alert ]</b> <#94A3B8>Total currency supply spiked abnormally, breaker forcibly engaged!'
    locked: '<b><#F43F5E>[ System Locked ]</b> <#94A3B8>Economy system entered protection mode. Reason: {reason}'
    locked-broadcast: '<b><#F43F5E>[ Global Announcement ]</b> <#94A3B8>Economy transaction system suspended (Security Lock). Reason: {reason}'
    build-message: '<#A78BFA>[SYNC.MONEY] <#475569>┇ <#94A3B8>[{type}] {content}'
  status: '{prefix}<#94A3B8>Current Breaker Status: <white>{state}'
  reset-success: '{prefix}<#4ADE80>Protection mechanism forcibly released, system services restored.'
  locked: '{prefix}<b><#F43F5E>[ Access Denied ]</b> <#94A3B8>Economy system locked, all financial flows frozen.'
  status-header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Economy Breaker Status</bold></gradient> <#475569>▰▰▰▰'
  state: ' <#38BDF8>▪ <#94A3B8>Operation State: <white>{state}'
  locked-warning: ' <b><#F43F5E>[ Critical Warning ] System is in deep lockdown, rejecting all financial operations!</b>'
  warning-state: ' <b><#FBBF24>[ Alert State ]</b> <#94A3B8>System is under abnormal observation period, high-risk functions are restricted.'
  reset-success-full: '{prefix}<#4ADE80>System security lock released, economic activities reopened.'
  info-header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Protection Mechanism Monitor</bold></gradient> <#475569>▰▰▰▰'
  resources-header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Resource Monitoring Report</bold></gradient> <#475569>▰▰▰▰'
  info:
    redis-available: ' <#38BDF8>▪ <#94A3B8>Redis Status: <white>{available}'
    redis-last-success: ' <#38BDF8>▪ <#94A3B8>Last Connection: <white>{time}'
    redis-failures: ' <#38BDF8>▪ <#94A3B8>Connection Failures: <white>{count}'
    redis-unavailable-local: ' <#38BDF8>▪ <#94A3B8>Redis Status: <#F43F5E>Not Required (LOCAL Mode)'
    redis-connections-na: ' <#38BDF8>▪ <#94A3B8>Redis Connections: <white>N/A (LOCAL Mode)'
    memory: ' <#38BDF8>▪ <#94A3B8>Memory Load: <white>{percent}%'
    memory-available: ' <#38BDF8>▪ <#94A3B8>Available Memory: <white>{mb} MB'
    redis-connections: ' <#38BDF8>▪ <#94A3B8>Redis Connections: <white>{count}'
    health-status: ' <#38BDF8>▪ <#94A3B8>Health Status: <white>{health}'
    redis-connection: '<#475569>┣━ <#A78BFA>[ Database Connection ]'
    resources: '<#475569>┣━ <#A78BFA>[ Server Resources ]'
    health-header: '<#475569>┣━ <#A78BFA>[ System Health ]'
  state-options:
    normal: '<green>Normal (NORMAL)'
    warning: '<yellow>Warning (WARNING)'
    locked: '<red>Locked (LOCKED)'
    not-enabled: '<gray>Not Enabled'
  usage-header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Breaker Guide</bold></gradient> <#475569>▰▰▰▰'
  usage-status: ' <#F8FAFC>/syncmoney breaker status <#475569>⦊ <white>View breaker status'
  usage-reset: ' <#F8FAFC>/syncmoney breaker reset <#475569>⦊ <white>Force reset breaker'
  usage-info: ' <#F8FAFC>/syncmoney breaker info <#475569>⦊ <white>View detailed info'
  usage-resources: ' <#F8FAFC>/syncmoney breaker resources <#475569>⦊ <white>View resource status'

