    invalid-number: '{prefix}<#F43F5E>Parameter Error ⦊ <#94A3B8>Threads and iterations must be integers.'
    invalid-threads: '{prefix}<#F43F5E>Parameter Error ⦊ <#94A3B8>Threads must be between 1 and 50.'
    invalid-iterations: '{prefix}<#F43F5E>Parameter Error ⦊ <#94A3B8>Iterations must be between 1 and 10000.'
    starting: '{prefix}<#A78BFA>Initiating stress test... <#94A3B8>(Config: {threads} threads, {iterations} iterations each)'
    note: ' <#38BDF8>▪ <#94A3B8>Note: The system will execute <white>{total} <#94A3B8>transfers of 1 unit between virtual accounts A and B.'
    result:
      header: '<#475569>▰▰▰▰ <gradient:#A78BFA:#38BDF8><bold>Stress Test Report</bold></gradient> <#475569>▰▰▰▰'
      time: ' <#38BDF8>▪ <#94A3B8>Total Time Elapsed: <white>{time}ms'
      success: ' <#38BDF8>▪ <#94A3B8>Successful Transactions: <#4ADE80>{success} <#475569>┇ <#94A3B8>Failed Transactions: <#F43F5E>{fail}'
      balance-header: ' <#38BDF8>▪ <#94A3B8>Post-Test Balances:'
      account-a: '   <#475569>├─ <#38BDF8>Virtual Account A: <#F8FAFC>{balance_a}'
      account-b: '   <#475569>└─ <#38BDF8>Virtual Account B: <#F8FAFC>{balance_b}'
      total-header: ' <#38BDF8>▪ <#94A3B8>Fund Attrition Verification:'
      initial-total: '   <#475569>├─ <#94A3B8>Initial Total: <white>{initial_total}'
      final-total: '   <#475569>└─ <#94A3B8>Final Total: <white>{final_total}'
      zero-loss-pass: '<#4ADE80>Verification Passed: Zero attrition in Total Supply!'
      zero-loss-fail: '<#F43F5E>Verification Failed: Fund discrepancy detected {difference}!'
  total-supply:
